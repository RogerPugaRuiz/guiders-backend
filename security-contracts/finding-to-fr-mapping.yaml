# finding-to-fr-mapping.yaml
# Trazabilidad bidireccional: hallazgo V2 (docs/SECURITY_AUDIT_2026_V2.md) ↔ FR (security-prd.md)
#
# Propósito (FR-CI-009):
#   - Todo hallazgo P0+P1 en scope tiene al menos un FR mapeado.
#   - Todo FR tiene al menos un hallazgo origen, salvo excepciones marcadas.
#   - CI valida este archivo en test/security/finding-to-fr-mapping.spec.ts.
#
# Scope: P0 (40 hallazgos CRÍTICOS) + P1 (60 ALTOS) = 100 hallazgos en scope
# Fuera de scope: MEDIA (47) y BAJA (19) — backlog post-hardening
#
# Formato por hallazgo:
#   id: <ID-V2>          # Identificador del informe V2
#   severity: CRÍTICA|ALTA
#   status_v2: NUEVO|PERSISTE  # Estado respecto a V1
#   fr_ids: [<FR-ID>, ...]     # FRs que cierran este hallazgo
#   epic: <N>            # Epic que lo implementa
#   sprint: 1|2          # Sprint objetivo
#   story_ref: "E<N>-S<M>"    # Story en security-epics.md (opcional, se completa al crear stories)
#   notes: "..."         # Aclaración si el hallazgo está cubierto parcialmente o tiene duplicado
#
# Metadatos
metadata:
  version: "1.0"
  date: "2026-04-21"
  source_audit: "docs/SECURITY_AUDIT_2026_V2.md"
  source_prd: "_bmad-output/planning-artifacts/security-prd.md"
  total_in_scope: 100
  total_critical: 40
  total_high: 60
  validator_test: "test/security/finding-to-fr-mapping.spec.ts"

