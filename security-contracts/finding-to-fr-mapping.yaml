# ─────────────────────────────────────────────────────────────────────────────
# EXCEPCIONES — FRs sin hallazgo directo en V2 (justificación requerida)
# ─────────────────────────────────────────────────────────────────────────────
fr_exceptions:
  - fr_id: FR-AUTH-013
    reason: >
      FR nuevo identificado en party mode: cubre procedimiento de rotación de claves de firma JWT
      con kid versionado. No corresponde a un hallazgo V2 específico sino al gap de procedimiento
      operacional que permitiría la exposición histórica de CRIT-001 (secretos en logs de clave RSA).
      Cierra riesgo sistémico de no-remediación ante futura exposición.

  - fr_id: FR-AUTHZ-006
    reason: >
      Contrato arquitectónico (DA-SEC-08 en security-architecture.md): orden obligatorio de guards
      AuthGuard → RolesGuard → TenantContextGuard. No hay hallazgo V2 que explícitamente lo viole,
      pero sí existe riesgo de regresión si en el futuro se reordena (especialmente tras fix de API-006
      donde @RequiredRoles era inerte). Guard de startup que valida el orden previene regresión.

  - fr_id: FR-CI-001
    reason: >
      FR de enforcement CI derivado de todos los hallazgos de API pero no trazable a uno solo.
      El endpoint-protections.spec.ts valida estructuralmente que toda la cobertura de guards
      en security-contracts/endpoint-protections.yaml esté implementada en código.

  - fr_id: FR-CI-002
    reason: >
      FR de enforcement CI (lint rule) derivado del patrón sistémico DATA-001…DATA-021
      y de la lección 67% de regresión V1→V2. No hay hallazgo V2 que "sea" una lint rule faltante;
      la regla previene que los fixes de DATA-* regresen.

  - fr_id: FR-CI-003
    reason: >
      FR de enforcement CI que cierra el rodeo de .skip en isolation tests.
      Derivado del análisis de causa raíz del 67% de regresión V1→V2.

  - fr_id: FR-CI-004
    reason: >
      Coverage gate de isolation tests. Derivado del análisis de causa raíz, no de hallazgo específico.

  - fr_id: FR-CI-005
    reason: >
      Mutation testing semanal. Capacidad de madurez de testing; no trazable a hallazgo V2 único.
      Cierra el riesgo de tests que "compilan pero no verifican" en módulos auth y multi-tenant.

  - fr_id: FR-CI-006
    reason: >
      TimeProvider refactor para time-travel tests. Prerrequisito técnico de FR-CI-007.
      No es hallazgo V2 sino deuda técnica detectada al intentar testear grace windows de expiración.

  - fr_id: FR-CI-007
    reason: >
      Time-travel tests para grace windows. Capacidad de testing requerida por FRs con lógica temporal
      (FR-AUTH-008 dual-read 30d, FR-AUTH-009 rotación API key). No hallazgo V2 directo.

  - fr_id: FR-CI-008
    reason: >
      WS gateway test driven by YAML. Derivado de los hallazgos WS-003…WS-005 de forma sistémica;
      el YAML define contratos WS verificados en CI en lugar de en code review manual.

  - fr_id: FR-RISK-001
    reason: >
      Plantilla de risk acceptance. Proceso de gobernanza sin hallazgo V2 directo; requerido
      para gestionar los hasta 3 ALTOS aceptables del Sprint 2 y el SPOF de Redis.

  - fr_id: FR-RISK-002
    reason: >
      Reviewer distinto del implementador en risk acceptance. Control de proceso; sin hallazgo V2.

  - fr_id: FR-RISK-003
    reason: >
      Límite de 3 risk acceptances activos. Control de proceso; sin hallazgo V2.

  - fr_id: FR-RISK-004
    reason: >
      GH Action de revisión periódica de risk acceptances. Automatización del proceso; sin hallazgo V2.

